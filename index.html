j<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>REYX v1.5</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .page { display: none; width: 100%; max-width: 400px; text-align: center; }
    .page.active { display: block; animation: fadeIn 0.5s; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    
    .logo-png {
      width: 100px;
      height: 100px;
      margin: 0 auto 24px;
      object-fit: contain;
    }
    
    h1 { font-size: 28px; margin-bottom: 8px; color: #ef4444; }
    p { color: #94a3b8; margin-bottom: 24px; }
    input {
      width: 100%; padding: 12px; margin-bottom: 16px;
      background: #1e293b; border: 1px solid #334155;
      border-radius: 8px; color: #e2e8f0; font-size: 16px;
    }
    button {
      width: 100%; padding: 12px; background: #ef4444;
      border: none; border-radius: 8px; color: white;
      font-size: 16px; font-weight: 600; cursor: pointer;
      margin-bottom: 12px;
    }
    button:active { background: #dc2626; }
    video { 
      width: 100%; 
      border-radius: 12px; 
      margin-bottom: 16px;
      border: 2px solid #334155;
    }
    .btn-secondary { background: #1e40af; }
    .btn-secondary:active { background: #1e3a8a; }
    .reyx-tag { 
      margin-top: 20px; 
      font-size: 18px; 
      font-weight: 600;
      color: #ef4444;
    }
  </style>
</head>
<body>

  <!-- PAGE 1: LOGIN -->
  <div id="loginPage" class="page active">
    <!-- GANTI LINK LOGO PNG LU DI SINI BRO -->
    <img src="https://i.ibb.co/7QpKsCX/spiderman-logo.png" alt="Logo" class="logo-png">
    <h1>REYX v1.5</h1>
    <p>Masuk buat lanjut</p>
    <input type="password" id="password" placeholder="Password">
    <button onclick="checkLogin()">Login</button>
  </div>

  <!-- PAGE 2: INTRO -->
  <div id="introPage" class="page">
    <h1>Intro REYX</h1>
    <p>Klik buat mulai intro</p>
    <video id="introVideo" playsinline>
      <source src="https://files.catbox.moe/wg0o7b.mp4" type="video/mp4">
    </video>
    <button class="btn-secondary" onclick="playIntro()">▶️ Play Intro</button>
    <button class="btn-secondary" onclick="skipIntro()">Skip Intro</button>
  </div>

  <!-- PAGE 3: WELCOME - VIDEO ADA SUARA + LOOP 🗿 -->
  <div id="welcomePage" class="page">
    <img src="https://i.ibb.co/7QpKsCX/spiderman-logo.png" alt="Logo" class="logo-png">
    <h1>Welcome</h1>
    <p>Ini project reyx</p>
    
    <!-- VIDEO LOOP + ADA SUARA - UDAH GW HAPUS muted -->
    <video id="mainVideo" autoplay loop playsinline>
      <source src="https://files.catbox.moe/bauw96.mp4" type="video/mp4">
    </video>
    
    <div class="reyx-tag">@reyx</div>
    
    <button class="btn-secondary" onclick="toggleMusic()" id="musicBtn" style="margin-top:24px;">🔊 Pause Musik</button>
    <button class="btn-secondary" onclick="toggleVideo()" id="videoBtn">🔇 Mute Video</button>
  </div>

  <!-- MUSIK BACKGROUND -->
  <audio id="bgMusic" loop>
    <source src="https://files.catbox.moe/qj8v4q.mp3" type="audio/mpeg">
  </audio>

  <script>
    const loginPage = document.getElementById('loginPage');
    const introPage = document.getElementById('introPage');
    const welcomePage = document.getElementById('welcomePage');
    const introVideo = document.getElementById('introVideo');
    const mainVideo = document.getElementById('mainVideo');
    const bgMusic = document.getElementById('bgMusic');
    const musicBtn = document.getElementById('musicBtn');
    const videoBtn = document.getElementById('videoBtn');
    
    function checkLogin() {
      const pass = document.getElementById('password').value;
      if(pass === 'reyx123') {
        loginPage.classList.remove('active');
        introPage.classList.add('active');
      } else {
        alert('Password salah bro 🗿');
      }
    }
    
    function playIntro() {
      introVideo.play();
      bgMusic.volume = 0.3;
      bgMusic.play();
    }
    
    function skipIntro() {
      introVideo.pause();
      goToWelcome();
    }
    
    introVideo.onended = function() {
      goToWelcome();
    };
    
    function goToWelcome() {
      introPage.classList.remove('active');
      welcomePage.classList.add('active');
      bgMusic.volume = 0.3; // musik agak pelan biar gak tabrakan sama suara video
      bgMusic.play();
      mainVideo.volume = 0.8; // suara video lebih kenceng
      mainVideo.play();
    }
    
    function toggleMusic() {
      if(bgMusic.paused) {
        bgMusic.play();
        musicBtn.textContent = '🔇 Pause Musik';
      } else {
        bgMusic.pause();
        musicBtn.textContent = '🔊 Play Musik';
      }
    }
    
    function toggleVideo() {
      if(mainVideo.muted) {
        mainVideo.muted = false;
        videoBtn.textContent = '🔇 Mute Video';
      } else {
        mainVideo.muted = true;
        videoBtn.textContent = '🔊 Unmute Video';
      }
    }
  </script>

</body>
</html>
